<!DOCTYPE html>
<html>
<head>
  <title>History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow-lg border-0 rounded-4 p-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-bold">Transaction History</h4>
      <a href="/" class="btn btn-sm btn-outline-dark">Back</a>
    </div>

    {% if histories %}
      <div class="list-group list-group-flush">

        {% for h in histories %}
        <div class="list-group-item d-flex justify-content-between align-items-center border-0 py-3">

          <!-- LEFT -->
          <div class="d-flex align-items-center gap-3">

            <!-- ICON -->
            <div class="bg-success text-white rounded-circle p-3">
              <i class="bi bi-wallet2"></i>
            </div>

            <!-- TEXT -->
            <div>
              <div class="fw-semibold">{{ h.action }}</div>
              <small class="text-muted">{{ h.created_at }}</small>
            </div>

          </div>

          <!-- RIGHT -->
          <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill">
            Success
          </span>

        </div>
        {% endfor %}

      </div>
    {% else %}
      <div class="text-center text-muted py-5">
        <i class="bi bi-clock-history fs-1"></i>
        <p class="mt-2">No transactions yet</p>
      </div>
    {% endif %}

  </div>

</div>

</body>
</html>
