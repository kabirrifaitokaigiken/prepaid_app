<!DOCTYPE html>
<html>
<head>
  <title>Top Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-bold">Top Up Balance</h4>
      <a href="/" class="btn btn-sm btn-outline-dark">Back</a>
    </div>

    <form method="post">
      {% csrf_token %}
      <input type="number" name="amount" class="form-control mb-3" placeholder="Enter amount">
      <button class="btn btn-success">Top Up</button>
    </form>

  </div>
</div>

</body>
</html>
