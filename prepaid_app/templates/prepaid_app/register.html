<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow-lg" style="width: 380px; border-radius: 15px;">
  
  <h4 class="text-center mb-3">Create Account</h4>

  <!-- 🔔 ALERT -->
  {% for message in messages %}
    <div class="alert alert-danger small py-2 text-center">
      {{ message }}
    </div>
  {% endfor %}

  <form method="POST">
    {% csrf_token %}

    <!-- USERNAME -->
    <div class="mb-3">
      <label class="form-label small">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" required>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3 position-relative">
      <label class="form-label small">Password</label>

      <input type="password" id="password" name="password" 
        class="form-control pe-5" placeholder="Enter password" required>

      <!-- 👁️ ICON -->
      <span id="eyeIcon" onclick="togglePassword()" 
        style="position:absolute; right:12px; top:38px; cursor:pointer; font-size:18px;">
        👁️
      </span>
    </div>

    <button class="btn btn-primary w-100">Register</button>
  </form>

  <a href="/login/" class="text-center mt-3 d-block small text-light">
    Already have account?
  </a>

</div>

<script>
function togglePassword() {
  const passwordInput = document.getElementById("password");
  const eyeIcon = document.getElementById("eyeIcon");

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    eyeIcon.innerText = "🙈";
  } else {
    passwordInput.type = "password";
    eyeIcon.innerText = "👁️";
  }
}
</script>

</body>
</html>
