<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow-lg" style="width: 400px; border-radius: 15px;">
  
  <h4 class="text-center mb-3">🚀 Create Account</h4>

  {% for message in messages %}
    <div class="alert alert-danger small p-2">{{ message }}</div>
  {% endfor %}

  <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label small">Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3 position-relative">
      <label class="form-label small">Password</label>
      <input type="password" name="password" id="password" class="form-control" required>
      
      <!-- 👁️ ICON -->
      <span onclick="togglePassword()" 
        style="position:absolute; right:10px; top:35px; cursor:pointer;">
        👁️
      </span>
    </div>

    <button class="btn btn-primary w-100">Register</button>
  </form>

  <a href="/login/" class="text-center mt-3 d-block small">
    Already have account?
  </a>

</div>

<script>
function togglePassword(){
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
