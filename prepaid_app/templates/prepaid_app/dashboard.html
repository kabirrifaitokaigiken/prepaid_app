<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">

  {% for message in messages %}
  <div class="toast align-items-center text-bg-success border-0 show mb-2" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        ✅ {{ message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  {% endfor %}

</div>
<div class="container mt-5">
  <div class="card shadow p-4">

    <h4 class="mb-3">Welcome, {{ user.username }}</h4>

    <div class="row">
      <div class="col-md-6">
        <p><b>Prepaid No:</b> {{ data.prepaid_no }}</p>
        <p><b>Balance:</b> {{ data.current_balance }}</p>
        <p><b>Expired:</b> {{ data.expired_date }}</p>
      </div>
    </div>

    <hr>

    <a href="/topup/" class="btn btn-success">Top Up</a>
    <a href="/history/" class="btn btn-secondary">History</a>
    <button class="btn btn-primary" onclick="openModal()">View QR</button>

  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="qrModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-4 text-center">

      <h5 class="mb-3">QR Code</h5>

      <!-- ✅ CENTER QR -->
      <div class="d-flex justify-content-center">
        <img src="/media/{{ qr_path }}" width="200" class="img-fluid">
      </div>

      <button class="btn btn-danger mt-4" data-bs-dismiss="modal">Close</button>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  let toasts = document.querySelectorAll('.toast');
  toasts.forEach((toast) => {
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000); // hilang 3 detik
  });
});
</script>

<script>
function openModal(){
  fetch('/qr/')
  var modal = new bootstrap.Modal(document.getElementById('qrModal'));
  modal.show();
}
</script>

</body>
</html>
